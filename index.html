<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Prism</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="landing-container">

    <img src="logo.png" class="logo-img">

    <!-- App Title -->

    <h1 class="prism-title">

        Prism

    </h1>

    <p class="subtitle">

        One assignment. Multiple ways to understand it.
        <br>
        Paste your assignment below and choose the format
        that works best for you.

    </p>


    <!-- Main Card -->

    <div class="landing-card">

        <h2>

            Paste Your Assignment

        </h2>

        <textarea
        placeholder="Copy and paste your assignment instructions here..."
        id="assignmentBox"
        ></textarea>

        <br>

        <!-- Change this link later if needed -->

        <a href="formats.html">

            <button class="translate-btn">

                Translate Assignment ➜

            </button>

        </a>
